<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Strutter Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        /* Prevents iOS from zooming in on text inputs */
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: { width: size, height: size, class: className, 'stroke-width': 2 },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [memberType, setMemberType] = useState(null);
            const [formData, setFormData] = useState({});
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitted, setSubmitted] = useState(false);

            useEffect(() => { document.title = "Strutter Orders"; }, []);

            const items = {
                optional: [
                    { id: 'jacket', name: 'Jacket', price: 171, needsSize: true },
                    { id: 'backpack', name: 'Backpack', price: 127, needsSize: false },
                ],
                newMemberRequired: [
                    { id: 'tan_jazz_shoes', name: 'Tan Jazz Shoes', price: 21.95, needsSize: true },
                    { id: 'tan_half_soles', name: 'Tan Half Soles', price: 12.95, needsSize: true },
                    { id: 'white_dance_tennis', name: 'White Dance Tennis Shoes', price: 40, needsSize: true },
                    { id: 'keds', name: 'Keds', price: 45, needsSize: true },
                    { id: 'black_silver_poms', name: 'Black and Silver Poms', price: 52, needsSize: false },
                    { id: 'black_athletic_skirt', name: 'Black Athletic Skirt', price: 20, needsSize: true },
                    { id: 'black_joggers', name: 'Black Joggers/Leggings', price: 20, needsSize: true },
                    { id: 'practice_tanks', name: '3 Practice Tanks', price: 40, needsSize: true },
                    { id: 'gloves', name: 'Strutter Gloves', price: 0, needsSize: false },
                    { id: 'long_socks', name: 'Long Socks', price: 0, needsSize: false },
                    { id: 'earrings', name: 'Earrings', price: 0, needsSize: false },
                ],
                allRequired: [
                    { id: 'pom_dress', name: 'Pom Uniform Dress', price: 221.45, needsSize: true },
                ],
                inventory: [
                    { id: 'sparkle_dress', name: 'Jazz Silver Sparkle Dress', price: 0, type: 'inventory', needsSize: true },
                    { id: 'white_cargo', name: 'White Cargo Pants', price: 0, type: 'inventory', needsSize: true },
                    { id: 'mock_neck', name: '"N" Mock Neck Top', price: 0, type: 'inventory', needsSize: true },
                    { id: 'sparkle_tank', name: 'Northeast Sparkle Tank', price: 0, type: 'inventory', needsSize: true },
                    { id: 'sweater', name: 'Strutter Sweater', price: 0, type: 'inventory', needsSize: true },
                    { id: 'skirt', name: 'Strutter Skirt', price: 0, type: 'inventory', needsSize: true },
                    { id: 'embroidered_jacket', name: 'Black Fitted Embroidered Jacket', price: 0, buyPrice: 90, type: 'inventory', needsSize: true },
                    { id: 'sweatpants', name: 'Black Sweatpants', price: 0, buyPrice: 35, type: 'inventory', needsSize: true },
                ]
            };

            const sizes = ['AXS', 'AS', 'AM', 'AL', 'AXL'];
            const shoeSizes = ['5', '5.5', '6', '6.5', '7', '7.5', '8', '8.5', '9', '9.5', '10'];

            const handleInputChange = (itemId, field, value) => {
                setFormData(prev => ({ ...prev, [itemId]: { ...prev[itemId], [field]: value } }));
            };

            const calculateTotal = () => {
                let total = 0;
                ['optional', 'newMemberRequired', 'allRequired'].forEach(s => {
                    items[s].forEach(i => { if (formData[i.id]?.status === 'order') total += i.price; });
                });
                items.inventory.forEach(i => { if (formData[i.id]?.status === 'purchase') total += i.buyPrice; });
                return total.toFixed(2);
            };

            const generateReceipt = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const total = calculateTotal();
                const name = formData.info?.name || "Member";
                
                doc.setFontSize(22);
                doc.setTextColor(79, 70, 229);
                doc.text("Strutters Dance Team", 105, 20, { align: "center" });
                doc.setFontSize(14);
                doc.setTextColor(100);
                doc.text("Official Order Receipt", 105, 30, { align: "center" });
                doc.setDrawColor(200);
                doc.line(20, 35, 190, 35);

                doc.setFontSize(10);
                doc.setTextColor(0);
                doc.text(`Student Name: ${name}`, 20, 45);
                doc.text(`Parent Email: ${formData.info?.contact || "N/A"}`, 20, 50);
                doc.text(`Membership: ${memberType === 'new' ? 'New Member' : 'Returning Member'}`, 20, 55);

                const tableRows = [];
                [...items.optional, ...items.newMemberRequired, ...items.allRequired, ...items.inventory].forEach(item => {
                    const data = formData[item.id];
                    const status = data?.status || (items.inventory.includes(item) ? 'inventory' : (memberType === 'new' && items.newMemberRequired.includes(item) ? 'order' : 'have'));
                    if (status !== 'skip' && status !== 'have') {
                        let price = "-";
                        if (status === 'order' && item.price > 0) price = `$${item.price.toFixed(2)}`;
                        else if (status === 'purchase' && item.buyPrice > 0) price = `$${item.buyPrice}`;
                        else if (status === 'order' || status === 'purchase') price = "Free";
                        else price = "Rental";
                        
                        tableRows.push([item.name, status.toUpperCase(), data?.size || "N/A", price]);
                    }
                });

                doc.autoTable({
                    startY: 65,
                    head: [['Item', 'Action', 'Size', 'Cost']],
                    body: tableRows,
                    headStyles: { fillStyle: [79, 70, 229] }
                });

                doc.text(`Total: $${total}`, 190, doc.lastAutoTable.finalY + 15, { align: "right" });
                doc.save(`Strutters_Receipt_${name.replace(/\s+/g, '_')}.pdf`);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                generateReceipt();
                setSubmitted(true);
            };

            if (submitted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 text-center animate-in">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-sm">
                            <Icon name="CheckCircle" size={64} className="text-emerald-500 mx-auto mb-4" />
                            <h2 className="text-2xl font-bold mb-2">Receipt Saved!</h2>
                            <p className="text-slate-600 mb-6">Check your phone's downloads. Please email the PDF to your coach.</p>
                            <button onClick={() => setSubmitted(false)} className="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">Edit Order</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-xl mx-auto p-4 pb-24">
                    <header className="flex justify-between items-center py-6">
                        <div className="flex items-center gap-2">
                            <div className="bg-amber-400 p-2 rounded-lg shadow-sm"><Icon name="Star" className="text-white fill-white" /></div>
                            <h1 className="text-xl font-bold">Strutters Gear</h1>
                        </div>
                        {memberType && <div className="text-right"><p className="text-xs text-slate-400">Total Due</p><p className="text-xl font-bold text-indigo-600">${calculateTotal()}</p></div>}
                    </header>

                    {!memberType ? (
                        <div className="space-y-4 animate-in">
                            <button onClick={() => setMemberType('new')} className="w-full p-8 bg-white border-2 border-slate-200 rounded-2xl text-left hover:border-indigo-600 transition-all group">
                                <Icon name="UserPlus" size={32} className="text-indigo-600 mb-2" />
                                <h3 className="text-xl font-bold">New Member</h3>
                                <p className="text-slate-500">First year on the team</p>
                            </button>
                            <button onClick={() => setMemberType('returning')} className="w-full p-8 bg-white border-2 border-slate-200 rounded-2xl text-left hover:border-indigo-600 transition-all group">
                                <Icon name="RefreshCw" size={32} className="text-amber-500 mb-2" />
                                <h3 className="text-xl font-bold">Returning Member</h3>
                                <p className="text-slate-500">Returning for another season</p>
                            </button>
                        </div>
                    ) : (
                        <form onSubmit={handleSubmit} className="space-y-6 animate-in">
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 grid gap-4">
                                <input required className="w-full p-3 bg-slate-50 rounded-lg border outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Student Name" onChange={e => handleInputChange('info', 'name', e.target.value)} />
                                <input required type="email" className="w-full p-3 bg-slate-50 rounded-lg border outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Parent Email" onChange={e => handleInputChange('info', 'contact', e.target.value)} />
                            </div>

                            <Section title="Optional Gear" items={items.optional} formData={formData} onUpdate={handleInputChange} sizes={sizes} allowSkip={true} />
                            <Section title={memberType === 'new' ? "Required Items" : "Replacements"} items={items.newMemberRequired} formData={formData} onUpdate={handleInputChange} sizes={sizes} shoeSizes={shoeSizes} allowIHaveThis={memberType === 'returning'} defaultStatus={memberType === 'returning' ? 'have' : 'order'} />
                            <Section title="Required Uniforms" items={items.allRequired} formData={formData} onUpdate={handleInputChange} sizes={sizes} defaultStatus="order" />
                            <Section title="Rentals" items={items.inventory} formData={formData} onUpdate={handleInputChange} sizes={sizes} isInventory={true} />

                            {/* Added spacer to prevent button from covering the last item */}
                            <div className="h-32"></div>

                            <button type="submit" className="fixed bottom-6 left-4 right-4 bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-2xl flex items-center justify-center gap-2 z-50">
                                <Icon name="Download" /> Download Receipt
                            </button>
                        </form>
                    )}
                </div>
            );
        };

        const Section = ({ title, items, formData, onUpdate, sizes, shoeSizes, allowIHaveThis, allowSkip, isInventory, defaultStatus }) => (
            <div className="bg-white rounded-2xl border-2 border-slate-100 overflow-hidden shadow-sm">
                <div className="bg-slate-50 px-4 py-3 border-b font-bold text-slate-700">{title}</div>
                <div className="divide-y">
                    {items.map(i => {
                        const status = formData[i.id]?.status || (isInventory ? 'inventory' : defaultStatus || 'order');
                        
                        // Price Logic: Show cost if ordering/buying. Don't show "Free" for skipped/already owned items.
                        let displayPrice = "";
                        if (status === 'order' || status === 'purchase') {
                            const priceVal = status === 'order' ? i.price : i.buyPrice;
                            displayPrice = priceVal > 0 ? `$${priceVal}` : 'Free';
                        } else if (status === 'inventory' || status === 'rent') {
                            displayPrice = 'Free';
                        }

                        return (
                            <div key={i.id} className="p-4 flex flex-col gap-3">
                                <div className="flex justify-between items-center">
                                    <span className="font-semibold text-slate-800">{i.name}</span>
                                    <span className="text-indigo-600 font-bold text-sm">
                                        {displayPrice}
                                    </span>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    <div className="flex bg-slate-100 p-1 rounded-lg">
                                        {!isInventory ? (
                                            <>
                                                <Btn active={status === 'order'} onClick={() => onUpdate(i.id, 'status', 'order')} label="Order" />
                                                {allowSkip && <Btn active={status === 'skip'} onClick={() => onUpdate(i.id, 'status', 'skip')} label="Skip" />}
                                                {i.allowRent && <Btn active={status === 'rent'} onClick={() => onUpdate(i.id, 'status', 'rent')} label="Rent" />}
                                                {allowIHaveThis && <Btn active={status === 'have'} onClick={() => onUpdate(i.id, 'status', 'have')} label="Have It" />}
                                            </>
                                        ) : (
                                            <>
                                                <Btn active={status === 'inventory'} onClick={() => onUpdate(i.id, 'status', 'inventory')} label="Rent" />
                                                {i.buyPrice && <Btn active={status === 'purchase'} onClick={() => onUpdate(i.id, 'status', 'purchase')} label={`Buy ($${i.buyPrice})`} />}
                                            </>
                                        )}
                                    </div>
                                    {i.needsSize && status !== 'skip' && status !== 'have' && (
                                        <select className="p-1.5 text-xs border rounded-lg bg-white" onChange={e => onUpdate(i.id, 'size', e.target.value)} required value={formData[i.id]?.size || ""}>
                                            <option value="">Size</option>
                                            {(i.name.toLowerCase().includes('shoe') || i.name.toLowerCase().includes('keds')) 
                                                ? shoeSizes.map(s => <option key={s} value={s}>{s}</option>) 
                                                : sizes.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    )}
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        const Btn = ({ active, onClick, label }) => (
            <button type="button" onClick={onClick} className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${active ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>{label}</button>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
