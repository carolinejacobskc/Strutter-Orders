<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strutter Orders</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .lucide {
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Fixed Icon Wrapper for Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: {
                            width: size,
                            height: size,
                            class: className,
                            'stroke-width': 2
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);

            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [memberType, setMemberType] = useState(null);
            const [formData, setFormData] = useState({});
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [error, setError] = useState(null);

            // Ensure document title is set on mount
            useEffect(() => {
                document.title = "Strutter Orders";
            }, []);

            const items = {
                optional: [
                    { id: 'jacket', name: 'Jacket', price: 171, category: 'Optional', description: 'Personalized/No fee waiver', needsSize: true },
                    { id: 'backpack', name: 'Backpack', price: 127, category: 'Optional', description: 'Personalized/No fee waiver', needsSize: false },
                ],
                newMemberRequired: [
                    { id: 'tan_jazz_shoes', name: 'Tan Jazz Shoes', price: 21.95, needsSize: true },
                    { id: 'tan_half_soles', name: 'Tan Half Soles', price: 12.95, needsSize: true },
                    { id: 'white_dance_tennis', name: 'White Dance Tennis Shoes', price: 40, needsSize: true },
                    { id: 'keds', name: 'Keds', price: 45, needsSize: true },
                    { id: 'black_silver_poms', name: 'Black and Silver Poms', price: 52, needsSize: false },
                    { id: 'black_athletic_skirt', name: 'Black Athletic Skirt', price: 20, needsSize: true },
                    { id: 'black_joggers', name: 'Black Joggers/Leggings', price: 20, needsSize: true },
                    { id: 'practice_tanks', name: '3 Practice Tanks', price: 40, needsSize: true },
                    { id: 'gloves', name: 'Strutter Gloves', price: 0, note: 'Free to keep', needsSize: false },
                    { id: 'long_socks', name: 'Long Socks', price: 0, note: 'Free to keep', needsSize: false },
                    { id: 'earrings', name: 'Earrings', price: 0, note: 'Free to keep', needsSize: false },
                ],
                allRequired: [
                    { id: 'pom_dress', name: 'Pom Uniform Dress', price: 147, needsSize: true },
                    { id: 'white_long_sleeve', name: 'White Long Sleeve', price: 17.99, needsSize: true, allowRent: true },
                    { id: 'black_lne_long_sleeve', name: 'Black LNE Long Sleeve', price: 42.99, needsSize: true, allowRent: true },
                ],
                inventory: [
                    { id: 'sparkle_dress', name: 'Jazz Silver Sparkle Dress', price: 0, type: 'inventory', needsSize: true },
                    { id: 'white_cargo', name: 'White Cargo Pants', price: 0, type: 'inventory', needsSize: true },
                    { id: 'mock_neck', name: '"N" Mock Neck Top', price: 0, type: 'inventory', needsSize: true },
                    { id: 'sparkle_tank', name: 'Northeast Sparkle Tank', price: 0, type: 'inventory', needsSize: true },
                    { id: 'sweater', name: 'Strutter Sweater', price: 0, type: 'inventory', needsSize: true },
                    { id: 'skirt', name: 'Strutter Skirt', price: 0, type: 'inventory', needsSize: true },
                    { id: 'embroidered_jacket', name: 'Black Fitted Embroidered Jacket', price: 0, buyPrice: 90, type: 'inventory', needsSize: true },
                    { id: 'sweatpants', name: 'Black Sweatpants', price: 0, buyPrice: 35, type: 'inventory', needsSize: true },
                ]
            };

            const sizes = ['AXS', 'AS', 'AM', 'AL', 'AXL'];
            const shoeSizes = ['5', '5.5', '6', '6.5', '7', '7.5', '8', '8.5', '9', '9.5', '10'];

            const handleInputChange = (itemId, field, value) => {
                setFormData(prev => ({
                    ...prev,
                    [itemId]: { ...prev[itemId], [field]: value }
                }));
            };

            const calculateTotal = () => {
                let total = 0;
                const sections = ['optional', 'newMemberRequired', 'allRequired'];

                sections.forEach(section => {
                    items[section].forEach(item => {
                        const data = formData[item.id];
                        if (data?.status === 'order') total += item.price;
                    });
                });

                items.inventory.forEach(item => {
                    const data = formData[item.id];
                    if (data?.status === 'purchase' && item.buyPrice) total += item.buyPrice;
                });

                return total.toFixed(2);
            };

            const generateReceipt = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const total = calculateTotal();
                const name = formData.info?.name || "Member";
                const date = new Date().toLocaleDateString();

                doc.setFontSize(22);
                doc.setTextColor(79, 70, 229); 
                doc.text("Strutters Dance Team", 105, 20, { align: "center" });
                
                doc.setFontSize(14);
                doc.setTextColor(100);
                doc.text("Official Order Receipt", 105, 30, { align: "center" });

                doc.setDrawColor(200);
                doc.line(20, 35, 190, 35);

                doc.setFontSize(10);
                doc.setTextColor(0);
                doc.text(`Student Name: ${name}`, 20, 45);
                doc.text(`Parent Email: ${formData.info?.contact || "N/A"}`, 20, 50);
                doc.text(`Membership: ${memberType === 'new' ? 'New Member' : 'Returning Member'}`, 20, 55);
                doc.text(`Date: ${date}`, 140, 45);

                const tableRows = [];
                const allItemCategories = [...items.optional, ...items.newMemberRequired, ...items.allRequired, ...items.inventory];
                
                allItemCategories.forEach(item => {
                    const data = formData[item.id];
                    const status = data?.status || (items.inventory.includes(item) ? 'inventory' : (memberType === 'new' && items.newMemberRequired.includes(item) ? 'order' : 'have'));
                    
                    if (status !== 'skip' && status !== 'have') {
                        let price = "Free";
                        if (status === 'order') price = `$${item.price.toFixed(2)}`;
                        if (status === 'purchase') price = `$${item.buyPrice}`;
                        if (status === 'rent' || status === 'inventory') price = "Rental/Free";

                        tableRows.push([
                            item.name,
                            status.charAt(0).toUpperCase() + status.slice(1),
                            data?.size || "N/A",
                            price
                        ]);
                    }
                });

                doc.autoTable({
                    startY: 65,
                    head: [['Item', 'Action', 'Size', 'Cost']],
                    body: tableRows,
                    headStyles: { fillStyle: [79, 70, 229] },
                    alternateRowStyles: { fillColor: [245, 247, 250] }
                });

                const finalY = doc.lastAutoTable.finalY || 70;
                doc.setFontSize(12);
                doc.setFont(undefined, 'bold');
                doc.text(`Estimated Total Due: $${total}`, 190, finalY + 15, { align: "right" });

                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(150);
                doc.text("Please provide this receipt to the coach to finalize your order.", 105, finalY + 30, { align: "center" });

                doc.save(`Strutters_Receipt_${name.replace(/\s+/g, '_')}.pdf`);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                
                try {
                    generateReceipt();
                    setSubmitted(true);
                } catch (err) {
                    setError("Could not generate receipt. Please try again.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (submitted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center animate-in">
                            <div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icon name="FileText" size={48} />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">Receipt Downloaded!</h2>
                            <p className="text-slate-600 mb-6">Your itemized receipt has been generated. Please send this file to your coach via email or text.</p>
                            <button onClick={() => window.location.reload()} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition">
                                Create Another
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="pb-20">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-amber-400 rounded-lg flex items-center justify-center text-white shadow-md">
                                    <Icon name="Star" size={24} className="fill-white" />
                                </div>
                                <div>
                                    <h1 className="font-bold text-xl leading-tight text-slate-800">Strutters Gear</h1>
                                    <p className="text-xs text-slate-500 uppercase tracking-wider font-semibold">Receipt Generator</p>
                                </div>
                            </div>
                            {memberType && (
                                <div className="text-right border-l border-slate-100 pl-4">
                                    <p className="text-xs text-slate-400">Estimated Total</p>
                                    <p className="text-xl font-bold text-indigo-600">${calculateTotal()}</p>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 pt-8">
                        {!memberType ? (
                            <section className="space-y-6 animate-in">
                                <div className="text-center mb-10">
                                    <h2 className="text-3xl font-bold mb-3">Welcome!</h2>
                                    <p className="text-slate-600">Select your status to generate your order receipt.</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <button onClick={() => setMemberType('new')} className="p-8 bg-white border-2 border-slate-200 rounded-2xl text-left hover:border-indigo-600 hover:shadow-xl transition-all group">
                                        <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-4 group-hover:bg-indigo-600 group-hover:text-white transition-colors"><Icon name="UserPlus" size={28} /></div>
                                        <h3 className="text-xl font-bold mb-2">New Member</h3>
                                        <p className="text-slate-500 text-sm">First year on the team.</p>
                                    </button>
                                    <button onClick={() => setMemberType('returning')} className="p-8 bg-white border-2 border-slate-200 rounded-2xl text-left hover:border-indigo-600 hover:shadow-xl transition-all group">
                                        <div className="w-12 h-12 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center mb-4 group-hover:bg-amber-600 group-hover:text-white transition-colors"><Icon name="RefreshCw" size={28} /></div>
                                        <h3 className="text-xl font-bold mb-2">Returning Member</h3>
                                        <p className="text-slate-500 text-sm">Returning for another season.</p>
                                    </button>
                                </div>
                            </section>
                        ) : (
                            <form onSubmit={handleSubmit} className="space-y-8 animate-in">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                    <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                                        <Icon name="ClipboardCheck" className="text-indigo-600" />
                                        Information
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-xs font-semibold text-slate-500 ml-1">Student Full Name</label>
                                            <input required type="text" className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Jane Doe" onChange={(e) => handleInputChange('info', 'name', e.target.value)} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-semibold text-slate-500 ml-1">Parent Email</label>
                                            <input required type="email" className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="parent@example.com" onChange={(e) => handleInputChange('info', 'contact', e.target.value)} />
                                        </div>
                                    </div>
                                </div>

                                <Section 
                                    title="New Member Optional" 
                                    color="bg-pink-100" 
                                    borderColor="border-pink-200" 
                                    items={items.optional} 
                                    formData={formData} 
                                    onUpdate={handleInputChange}
                                    sizes={sizes}
                                    allowIHaveThis={false}
                                    allowSkip={true}
                                />

                                <Section 
                                    title={memberType === 'returning' ? "Gear Replacements" : "New Member Required"} 
                                    color="bg-purple-100" 
                                    borderColor="border-purple-200" 
                                    items={items.newMemberRequired} 
                                    formData={formData} 
                                    onUpdate={handleInputChange}
                                    sizes={sizes}
                                    shoeSizes={shoeSizes}
                                    allowIHaveThis={memberType === 'returning'}
                                    defaultStatus={memberType === 'returning' ? 'have' : 'order'}
                                />

                                <Section 
                                    title="Required for ALL Members" 
                                    color="bg-blue-100" 
                                    borderColor="border-blue-200" 
                                    items={items.allRequired} 
                                    formData={formData} 
                                    onUpdate={handleInputChange}
                                    sizes={sizes}
                                    allowIHaveThis={false}
                                    defaultStatus="order"
                                />

                                <Section 
                                    title="Inventory (Rentals)" 
                                    color="bg-amber-100" 
                                    borderColor="border-amber-200" 
                                    items={items.inventory} 
                                    formData={formData} 
                                    onUpdate={handleInputChange}
                                    sizes={sizes}
                                    isInventory={true}
                                />

                                <div className="sticky bottom-4 left-0 right-0 sm:static bg-white p-4 rounded-xl shadow-lg sm:shadow-none sm:bg-transparent sm:p-0">
                                    <button type="submit" disabled={isSubmitting} className="w-full flex items-center justify-center gap-2 px-8 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition disabled:opacity-50">
                                        <Icon name="Download" size={18} />
                                        {isSubmitting ? 'Generating Receipt...' : 'Download Itemized Receipt'}
                                    </button>
                                    <p className="text-center text-xs text-slate-500 mt-2">After downloading, send the PDF to your coach.</p>
                                </div>
                            </form>
                        )}
                    </main>
                </div>
            );
        };

        const Section = ({ title, color, borderColor, items, formData, onUpdate, sizes, shoeSizes, allowIHaveThis, allowSkip, isInventory, defaultStatus }) => {
            return (
                <div className={`overflow-hidden bg-white border-2 ${borderColor} rounded-2xl shadow-sm transition-all hover:shadow-md`}>
                    <div className={`${color} px-6 py-4 border-b ${borderColor} flex justify-between items-center`}>
                        <h3 className="font-bold text-slate-800">{title}</h3>
                    </div>
                    <div className="divide-y divide-slate-100">
                        {items.map((item) => {
                            const currentStatus = formData[item.id]?.status || (isInventory ? 'inventory' : defaultStatus || 'order');
                            
                            return (
                                <div key={item.id} className="p-4 sm:p-6 hover:bg-slate-50/50 transition-colors">
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                        <div>
                                            <h4 className="font-semibold text-slate-800">{item.name}</h4>
                                            <div className="flex flex-wrap items-center gap-2 mt-1">
                                                <span className="text-sm text-indigo-600 font-bold">
                                                    {item.price > 0 && currentStatus !== 'rent' && currentStatus !== 'skip' && currentStatus !== 'have' ? `$${item.price.toFixed(2)}` : (item.buyPrice && currentStatus === 'purchase' ? `$${item.buyPrice}` : (currentStatus === 'skip' || currentStatus === 'have' ? '' : 'Free'))}
                                                </span>
                                            </div>
                                        </div>

                                        <div className="flex flex-wrap items-center gap-2">
                                            <div className="flex bg-slate-100 p-1 rounded-lg">
                                                {!isInventory ? (
                                                    <>
                                                        <Btn active={currentStatus === 'order'} onClick={() => onUpdate(item.id, 'status', 'order')} label="Order" />
                                                        {allowSkip && <Btn active={currentStatus === 'skip'} color="text-slate-600" onClick={() => onUpdate(item.id, 'status', 'skip')} label="Skip" />}
                                                        {item.allowRent && <Btn active={currentStatus === 'rent'} color="text-amber-600" onClick={() => onUpdate(item.id, 'status', 'rent')} label="Rent" />}
                                                        {allowIHaveThis && <Btn active={currentStatus === 'have'} color="text-emerald-600" onClick={() => onUpdate(item.id, 'status', 'have')} label="I Have It" />}
                                                    </>
                                                ) : (
                                                    <>
                                                        <Btn active={currentStatus === 'inventory'} onClick={() => onUpdate(item.id, 'status', 'inventory')} label="Rent" />
                                                        {item.buyPrice && <Btn active={currentStatus === 'purchase'} onClick={() => onUpdate(item.id, 'status', 'purchase')} label={`Buy ($${item.buyPrice})`} />}
                                                    </>
                                                )}
                                            </div>

                                            {item.needsSize && currentStatus !== 'skip' && currentStatus !== 'have' && (
                                                <select
                                                    className={`px-3 py-1.5 text-sm bg-white border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 transition-colors ${formData[item.id]?.size ? 'border-indigo-300 bg-indigo-50' : 'border-slate-200'}`}
                                                    onChange={(e) => onUpdate(item.id, 'size', e.target.value)}
                                                    required={currentStatus === 'order' || currentStatus === 'inventory' || currentStatus === 'purchase'}
                                                    value={formData[item.id]?.size || ""}
                                                >
                                                    <option value="">Size</option>
                                                    {(item.name.toLowerCase().includes('shoe') || item.name.toLowerCase().includes('keds')) 
                                                        ? shoeSizes.map(s => <option key={s} value={s}>{s}</option>)
                                                        : sizes.map(s => <option key={s} value={s}>{s}</option>)
                                                    }
                                                </select>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const Btn = ({ active, onClick, label, color = "text-indigo-600" }) => (
            <button
                type="button"
                onClick={onClick}
                className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${active ? `bg-white ${color} shadow-sm` : 'text-slate-500 hover:text-slate-700'}`}
            >
                {label}
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
